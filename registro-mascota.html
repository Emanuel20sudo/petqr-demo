<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PetQR - Registrar mascota</title>

<style>

body{
    font-family:Arial, sans-serif;
    background:#eef6ff;
    margin:0;
}

.container{
    max-width:450px;
    background:white;
    margin:40px auto;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 15px #ccc;
}

h1{
    text-align:center;
    color:#1976d2;
}

.pet{
    text-align:center;
    font-size:70px;
}

input, textarea, select{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:10px;
    border:1px solid #ccc;
}

textarea{
    height:80px;
}

.button{
    display:block;
    text-align:center;
    background:#1976d2;
    color:white;
    text-decoration:none;
    padding:15px;
    border-radius:12px;
    margin-top:15px;
}

.back{
    background:#555;
}

</style>

</head>


<body>


<div class="container">


<div class="pet">
🐶
</div>


<h1>Registrar mascota</h1>


<label>Nombre de la mascota</label>

<input type="text" placeholder="Ejemplo: Luna">


<label>Raza</label>

<input type="text" placeholder="Ejemplo: Golden Retriever">


<label>Edad</label>

<input type="number" placeholder="Ejemplo: 3">


<label>Color</label>

<input type="text" placeholder="Ejemplo: Dorado">


<label>Teléfono del dueño</label>

<input type="tel" placeholder="Ejemplo: 999999999">


<label>Información importante</label>

<textarea placeholder="Alergias, cuidados, características..."></textarea>


<a class="button" href="panel.html">
✅ Guardar mascota
</a>


<a class="button back" href="panel.html">
⬅ Volver al panel
</a>


</div>


</body>

</html>
